services:
  - type: web
    name: agentic-microsystems-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run api:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGINS
        value: https://agenticmicrosystems.com,https://www.agenticmicrosystems.com
